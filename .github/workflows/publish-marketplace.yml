name: Publish Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-action-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate action metadata exists
        run: test -f action.yml

      - name: Verify action metadata fields
        shell: bash
        run: |
          ruby -ryaml -e '
            raw = File.read("action.yml")
            meta = YAML.safe_load(raw)

            unless meta.is_a?(Hash)
              warn "action.yml is not a valid YAML mapping"
              exit 1
            end

            required = %w[name description runs]
            missing = required.reject { |k| meta[k] }

            if missing.any?
              missing.each { |k| warn "Missing required key in action.yml: #{k}" }
              exit 1
            end
          '

      - name: Marketplace publication note
        run: |
          echo "Action metadata validated."
          echo "If this action is already listed, publishing is tied to your release tag."
          echo "If this is the first publish, complete the one-time marketplace listing from the repository UI."

