name: Deploy Production Workflow

on:
  workflow_run:
    workflows: ["Publish Images to Docker Hub"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: self-hosted
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags
          TAG="$(git tag --points-at HEAD | head -n1)"

          if [[ -z "$TAG" ]]; then
            echo "No git tag found for this commit. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when commit is not tagged
        if: steps.tag.outputs.skip == 'true'
        run: echo "Deploy skipped because this workflow run is not from a tagged release commit."

      - name: Docker login
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PASSWORD="${DOCKERHUB_PASSWORD:-${DOCKERHUB_TOKEN:-}}"
          if [[ -z "${DOCKERHUB_USERNAME// }" || -z "${PASSWORD// }" ]]; then
            echo "Missing Docker Hub credentials. Set DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD (or DOCKERHUB_TOKEN)."
            exit 1
          fi
          echo "$PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Deploy production stack
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          export IMAGE_TAG="${{ steps.tag.outputs.value }}"
          docker compose pull || true
          docker compose up -d --build
          docker image prune -f

