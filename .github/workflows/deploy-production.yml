name: Deploy Production Workflow

on:
  workflow_run:
    workflows: ["Publish Container Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: self-hosted
    timeout-minutes: 30

    environment:
      name: production

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      # 🔹 Resolve image tag (same logic as your K8s workflow)
      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags
          TAG="$(git tag --points-at HEAD | head -n1)"

          if [[ -z "$TAG" ]]; then
            echo "No git tag found for this commit. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when commit is not tagged
        if: steps.tag.outputs.skip == 'true'
        run: echo "Deploy skipped because this workflow run is not from a tagged release commit."

      # 🔹 Docker login
      - name: Docker login
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DOCKERHUB_USERNAME// }" || -z "${DOCKERHUB_PASSWORD// }" ]]; then
            echo "Missing Docker Hub credentials."
            exit 1
          fi

          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      # 🔹 Export IMAGE_TAG (used by docker-compose)
      - name: Set image tag
        if: steps.tag.outputs.skip != 'true'
        run: echo "IMAGE_TAG=${{ steps.tag.outputs.value }}" >> $GITHUB_ENV

      # 🔹 Deploy using docker compose
      - name: Deploy production stack
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker compose pull || true
          docker compose up -d --build
          docker image prune -f

      # 🔹 Optional: Verify containers
      - name: Verify running containers
        if: steps.tag.outputs.skip != 'true'
        run: docker ps