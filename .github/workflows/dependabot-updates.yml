name: Dependabot Updates Checks

on:
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-validation:
#    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Run backend tests for dependency update
        run: mvn -B -f backend/pom.xml test

      - name: Install root dependencies and run tests
        run: |
          npm ci
          npm test

      - name: Install and build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

